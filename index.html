<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DeutschMeister – Voice Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080c14;
  --surface: #0f1520;
  --card: #131c2e;
  --border: #1e2d47;
  --accent: #4f9eff;
  --accent-glow: rgba(79,158,255,0.35);
  --gold: #f0c060;
  --text: #e8eef8;
  --muted: #5a7090;
  --danger: #ff5f6d;
  --success: #43e97b;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(79,158,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(240,192,96,0.05) 0%, transparent 55%),
    var(--bg);
}

.stars {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 8% 55%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.25) 0%, transparent 100%);
}

.app {
  position: relative; z-index: 1;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 24px 20px 32px;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand { display: flex; align-items: center; gap: 10px; }
.brand-flag { font-size: 22px; line-height: 1; }
.brand-name {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.3px;
}
.brand-name span { color: var(--accent); }

.api-key-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 13px;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  cursor: pointer; font-family: var(--font-body);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.api-key-btn:hover { border-color: var(--accent); color: var(--accent); }
.api-key-btn.set { color: var(--success); border-color: rgba(67,233,123,0.3); }

/* Level selector */
.level-section {
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}

.level-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
}

.level-pills {
  display: flex; gap: 6px;
  flex-wrap: wrap; justify-content: center;
}

.level-pill {
  padding: 6px 16px; border-radius: 30px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s; letter-spacing: 0.3px;
}
.level-pill:hover { border-color: var(--accent); color: var(--text); }
.level-pill.active {
  background: var(--accent); border-color: var(--accent);
  color: #000; box-shadow: 0 0 16px var(--accent-glow);
}

/* Orb section */
.orb-section {
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
  flex: 1; justify-content: center;
}

.orb-wrapper {
  position: relative;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid var(--accent-glow);
  opacity: 0; pointer-events: none;
}
.ring-1 { width: 200px; height: 200px; }
.ring-2 { width: 244px; height: 244px; }
.ring-3 { width: 288px; height: 288px; }

.orb-wrapper.listening .ring-1 { animation: ripple 2s ease-out infinite; }
.orb-wrapper.listening .ring-2 { animation: ripple 2s ease-out 0.55s infinite; }
.orb-wrapper.listening .ring-3 { animation: ripple 2s ease-out 1.1s infinite; }

.orb-wrapper.speaking .ring-1 { animation: ripple-gold 1.4s ease-out infinite; border-color: rgba(240,192,96,0.45); }
.orb-wrapper.speaking .ring-2 { animation: ripple-gold 1.4s ease-out 0.45s infinite; border-color: rgba(240,192,96,0.28); }
.orb-wrapper.speaking .ring-3 { animation: ripple-gold 1.4s ease-out 0.9s infinite; border-color: rgba(240,192,96,0.15); }

@keyframes ripple {
  0% { transform: scale(0.85); opacity: 0.75; }
  100% { transform: scale(1.18); opacity: 0; }
}
@keyframes ripple-gold {
  0% { transform: scale(0.85); opacity: 0.85; }
  100% { transform: scale(1.22); opacity: 0; }
}

.orb {
  width: 148px; height: 148px; border-radius: 50%;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  background: radial-gradient(circle at 38% 35%,
    rgba(79,158,255,0.22) 0%, rgba(20,40,80,0.9) 45%, rgba(10,20,45,0.95) 100%);
  border: 1px solid rgba(79,158,255,0.28);
  box-shadow: 0 0 40px rgba(79,158,255,0.13), 0 0 80px rgba(79,158,255,0.05),
              inset 0 1px 0 rgba(255,255,255,0.09);
}
.orb::before {
  content: '';
  position: absolute; top: 14px; left: 24px;
  width: 38px; height: 18px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.1), transparent);
  border-radius: 50%; transform: rotate(-20deg);
}

.orb-icon {
  font-size: 44px; line-height: 1;
  transition: all 0.3s;
  filter: drop-shadow(0 0 10px rgba(79,158,255,0.45));
  user-select: none;
}

/* Idle float */
.orb-wrapper.idle .orb { animation: float 4s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Listening */
.orb-wrapper.listening .orb {
  background: radial-gradient(circle at 38% 35%,
    rgba(79,158,255,0.42) 0%, rgba(20,50,110,0.95) 45%, rgba(10,25,60,0.98) 100%);
  border-color: rgba(79,158,255,0.68);
  box-shadow: 0 0 50px rgba(79,158,255,0.32), 0 0 100px rgba(79,158,255,0.13),
              inset 0 1px 0 rgba(255,255,255,0.14);
  animation: orb-listen 0.8s ease-in-out infinite alternate;
}
@keyframes orb-listen { from { transform: scale(1); } to { transform: scale(1.04); } }

/* Speaking */
.orb-wrapper.speaking .orb {
  background: radial-gradient(circle at 38% 35%,
    rgba(240,192,96,0.38) 0%, rgba(60,40,10,0.95) 45%, rgba(20,15,5,0.98) 100%);
  border-color: rgba(240,192,96,0.58);
  box-shadow: 0 0 50px rgba(240,192,96,0.28), 0 0 100px rgba(240,192,96,0.1),
              inset 0 1px 0 rgba(255,255,255,0.1);
  animation: orb-speak 0.5s ease-in-out infinite alternate;
}
@keyframes orb-speak { from { transform: scale(1); } to { transform: scale(1.06); } }

/* Processing */
.orb-wrapper.processing .orb {
  border-color: rgba(79,158,255,0.5);
  animation: orb-process 1.6s linear infinite;
}
@keyframes orb-process {
  0%,100% { box-shadow: 0 0 40px rgba(79,158,255,0.18), inset 0 1px 0 rgba(255,255,255,0.08); }
  50% { box-shadow: 0 0 70px rgba(79,158,255,0.4), inset 0 1px 0 rgba(255,255,255,0.14); }
}

.orb-wrapper:not(.listening):not(.speaking):not(.processing):hover .orb { transform: scale(1.04); }

/* Waveform */
.waveform {
  display: flex; align-items: center; gap: 3px;
  height: 24px; opacity: 0; transition: opacity 0.3s;
}
.waveform.active { opacity: 1; }
.waveform .bar {
  width: 3px; background: var(--accent); border-radius: 2px;
  animation: wave 0.85s ease-in-out infinite; min-height: 4px;
}
.waveform .bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
.waveform .bar:nth-child(2) { animation-delay: 0.1s;  height: 16px; }
.waveform .bar:nth-child(3) { animation-delay: 0.2s;  height: 22px; }
.waveform .bar:nth-child(4) { animation-delay: 0.3s;  height: 14px; }
.waveform .bar:nth-child(5) { animation-delay: 0.15s; height: 20px; }
.waveform .bar:nth-child(6) { animation-delay: 0.25s; height: 10px; }
.waveform .bar:nth-child(7) { animation-delay: 0.05s; height: 16px; }
@keyframes wave {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1.1); }
}

/* Status */
.status-text {
  font-size: 15px; font-weight: 400;
  color: var(--muted); text-align: center;
  min-height: 22px; transition: all 0.3s; letter-spacing: 0.2px;
}
.status-text.active   { color: var(--text); }
.status-text.listening { color: var(--accent); }
.status-text.speaking  { color: var(--gold); }
.status-text.error     { color: var(--danger); font-size: 13px; }

/* Transcript bubble */
.transcript-bubble {
  width: 100%;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 18px;
  font-size: 14px; line-height: 1.6; color: var(--text);
  min-height: 56px; max-height: 130px; overflow-y: auto;
  text-align: center; transition: all 0.3s;
  opacity: 0; transform: translateY(6px);
  scrollbar-width: none;
}
.transcript-bubble::-webkit-scrollbar { display: none; }
.transcript-bubble.visible { opacity: 1; transform: translateY(0); }
.transcript-bubble.user-text { border-color: rgba(79,158,255,0.3); }
.transcript-bubble.ai-text {
  border-color: rgba(240,192,96,0.25);
  background: rgba(25,18,5,0.7);
  color: #f0e0b0; font-style: italic;
}

/* Bottom controls */
.bottom-controls {
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}

.stop-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(255,95,109,0.13);
  border: 1px solid rgba(255,95,109,0.38);
  color: var(--danger); font-size: 18px;
  cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: var(--font-body);
}
.stop-btn:hover { background: rgba(255,95,109,0.24); }
.stop-btn.visible { display: flex; }

.tap-hint {
  font-size: 12px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 500; transition: opacity 0.3s;
}

.history-toggle {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid transparent; transition: all 0.2s;
  font-family: var(--font-body); background: none;
}
.history-toggle:hover { border-color: var(--border); color: var(--text); }

/* History drawer */
.history-drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-height: 58vh;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  padding: 0 20px 36px; overflow: hidden;
}
.history-drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto 16px;
}

.drawer-title {
  font-family: var(--font-display); font-size: 16px;
  font-weight: 700; margin-bottom: 14px; color: var(--text);
}

.history-list {
  overflow-y: auto; max-height: calc(58vh - 90px);
  display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.history-item {
  padding: 10px 14px; border-radius: 12px;
  font-size: 13px; line-height: 1.55;
}
.history-item.user {
  background: rgba(79,158,255,0.07);
  border: 1px solid rgba(79,158,255,0.14); color: var(--text);
}
.history-item.ai {
  background: rgba(240,192,96,0.06);
  border: 1px solid rgba(240,192,96,0.12);
  color: #f0e0b0; font-style: italic;
}
.history-item .who {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 4px; font-style: normal;
}
.history-item.user .who { color: var(--accent); }
.history-item.ai .who { color: var(--gold); }
.history-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }

.backdrop {
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  display: none;
}
.backdrop.open { display: block; }

/* API modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; padding: 20px;
}
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 22px; padding: 28px 24px;
  width: 100%; max-width: 440px; margin: 0 auto;
}
.modal h3 {
  font-family: var(--font-display); font-size: 22px; margin-bottom: 8px;
}
.modal p {
  color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 18px;
}
.modal p a { color: var(--accent); text-decoration: none; }
.modal-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; color: var(--text);
  font-size: 14px; font-family: var(--font-body);
  outline: none; margin-bottom: 14px; transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--muted); }
.modal-actions { display: flex; gap: 10px; }
.btn-primary {
  flex: 1; padding: 12px; background: var(--accent); color: #000;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font-body);
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  flex: 1; padding: 12px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-body);
  transition: opacity 0.2s;
}
.btn-secondary:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="stars"></div>

<div class="modal-overlay hidden" id="apiModal">
  <div class="modal">
    <h3>🔑 Gemini API Key</h3>
    <p>Get your free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> — no credit card needed. 1,500 free conversations/day!</p>
    <input class="modal-input" type="password" id="apiKeyInput" placeholder="AIza..." />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveKey()">Save & Start</button>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeHistory()"></div>
<div class="history-drawer" id="historyDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Conversation History</div>
  <div class="history-list" id="historyList">
    <div class="history-empty">No conversation yet. Tap the orb and start speaking!</div>
  </div>
</div>

<div class="app">

  <div class="header">
    <div class="brand">
      <span class="brand-flag">🇩🇪</span>
      <span class="brand-name">Deutsch<span>Meister</span></span>
    </div>
    <button class="api-key-btn" id="apiBtn" onclick="openModal()">
      🔑 <span id="apiBtnLabel">API Key</span>
    </button>
  </div>

  <div class="level-section">
    <div class="level-label">Your German Level</div>
    <div class="level-pills">
      <button class="level-pill" onclick="setLevel('A1',this)">A1</button>
      <button class="level-pill" onclick="setLevel('A2',this)">A2</button>
      <button class="level-pill active" onclick="setLevel('B1',this)">B1</button>
      <button class="level-pill" onclick="setLevel('B2',this)">B2</button>
      <button class="level-pill" onclick="setLevel('C1',this)">C1</button>
      <button class="level-pill" onclick="setLevel('C2',this)">C2</button>
    </div>
  </div>

  <div class="orb-section">
    <div class="orb-wrapper idle" id="orbWrapper" onclick="handleOrbClick()">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="orb">
        <span class="orb-icon" id="orbIcon">🎙️</span>
      </div>
    </div>

    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="status-text" id="statusText">Tap to start speaking</div>
    <div class="transcript-bubble" id="transcriptBubble"></div>
  </div>

  <div class="bottom-controls">
    <button class="stop-btn" id="stopBtn" onclick="stopSpeaking()">⏹</button>
    <span class="tap-hint" id="tapHint">tap orb to speak</span>
    <button class="history-toggle" onclick="openHistory()">
      💬 <span id="historyCount">0 messages</span>
    </button>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let apiKey      = localStorage.getItem('dm_gemini_key') || '';
let level       = localStorage.getItem('dm_level') || 'B1';
let chatHistory = [];
let isListening = false;
let isSpeaking  = false;
let isProcessing= false;
let recognition = null;
const synth     = window.speechSynthesis;
const SR        = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── DOM ────────────────────────────────────────────────────────────
const orbWrapper       = document.getElementById('orbWrapper');
const orbIcon          = document.getElementById('orbIcon');
const statusEl         = document.getElementById('statusText');
const bubbleEl         = document.getElementById('transcriptBubble');
const waveformEl       = document.getElementById('waveform');
const stopBtn          = document.getElementById('stopBtn');
const tapHint          = document.getElementById('tapHint');

// ── Boot ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.level-pill').forEach(p =>
    p.classList.toggle('active', p.textContent.trim() === level));
  if (apiKey) markKeySet();
  if (synth) { synth.getVoices(); synth.onvoiceschanged = () => synth.getVoices(); }
  if (!SR) setStatus('⚠️ Voice not supported — please use Chrome or Safari', 'error');
});

// ── Level ──────────────────────────────────────────────────────────
function setLevel(lvl, el) {
  level = lvl;
  localStorage.setItem('dm_level', lvl);
  document.querySelectorAll('.level-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  chatHistory = [];
  updateCount();
  flash('Level set to ' + lvl + ' — let\'s go!', 'user-text', 2000);
}

// ── API Key ────────────────────────────────────────────────────────
function openModal()  { document.getElementById('apiKeyInput').value = apiKey; document.getElementById('apiModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('apiModal').classList.add('hidden'); }
function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (k) { apiKey = k; localStorage.setItem('dm_gemini_key', k); markKeySet(); }
  closeModal();
}
function markKeySet() {
  document.getElementById('apiBtnLabel').textContent = 'Key Set ✓';
  document.getElementById('apiBtn').classList.add('set');
}

// ── Orb state ──────────────────────────────────────────────────────
function setState(s) {
  // s: idle | listening | processing | speaking
  orbWrapper.className = 'orb-wrapper ' + s;
  waveformEl.className = 'waveform' + (s === 'listening' ? ' active' : '');
  orbIcon.textContent  = { idle:'🎙️', listening:'🎙️', processing:'⏳', speaking:'🔊' }[s] || '🎙️';
  stopBtn.className    = 'stop-btn' + (s === 'speaking' ? ' visible' : '');
  tapHint.style.opacity = s === 'speaking' ? '0' : '1';
}
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status-text' + (type ? ' ' + type : '');
}
function showBubble(txt, cls) {
  bubbleEl.textContent = txt;
  bubbleEl.className   = 'transcript-bubble visible ' + (cls || '');
}
function hideBubble()  { bubbleEl.className = 'transcript-bubble'; }
function flash(txt, cls, ms) {
  showBubble(txt, cls);
  setTimeout(hideBubble, ms || 2000);
}

// ── Orb click ──────────────────────────────────────────────────────
function handleOrbClick() {
  if (isSpeaking)   { stopSpeaking(); return; }
  if (isProcessing) { return; }
  if (isListening)  { stopListening(); return; }
  startListening();
}

// ── Speech Recognition ─────────────────────────────────────────────
function startListening() {
  if (!SR)     { setStatus('⚠️ Not supported — use Chrome or Safari', 'error'); return; }
  if (!apiKey) { openModal(); return; }

  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.continuous     = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setState('listening');
    setStatus('Listening…', 'listening');
    hideBubble();
  };

  let finalText = '';
  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    showBubble((final || interim).trim(), 'user-text');
    if (final) finalText = final.trim();
  };

  recognition.onerror = e => {
    isListening = false;
    setState('idle');
    const msgs = {
      'no-speech':   'Nothing heard — tap and try again',
      'not-allowed': 'Mic blocked — allow access in browser settings',
      'network':     'Network error — check your connection'
    };
    setStatus(msgs[e.error] || 'Error: ' + e.error, 'error');
  };

  recognition.onend = () => {
    isListening = false;
    if (finalText) { processUserSpeech(finalText); finalText = ''; }
    else           { setState('idle'); setStatus('Tap to start speaking', ''); hideBubble(); }
  };

  try { recognition.start(); }
  catch(e) { setStatus('Could not start mic — try again', 'error'); }
}

function stopListening() {
  if (recognition && isListening) recognition.stop();
}

// ── Gemini call ────────────────────────────────────────────────────
async function processUserSpeech(text) {
  isProcessing = true;
  setState('processing');
  setStatus('Thinking…', '');
  showBubble(text, 'user-text');

  chatHistory.push({ role: 'user', content: text });
  if (chatHistory.length > 30) chatHistory = chatHistory.slice(-28);

  try {
    const reply = await callGemini(chatHistory, systemPrompt());
    chatHistory.push({ role: 'assistant', content: reply });
    updateCount();
    isProcessing = false;
    speakReply(reply);
  } catch(e) {
    isProcessing = false;
    setState('idle');
    const msg = friendlyError(e);
    setStatus(msg, 'error');
    flash(msg, 'user-text', 6000);
  }
}

async function callGemini(messages, sysPrompt) {
  const body = {
    systemInstruction: { parts: [{ text: sysPrompt }] },
    contents: messages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    })),
    generationConfig: { maxOutputTokens: 300, temperature: 0.88 }
  };

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(err.error?.message || 'HTTP ' + res.status);
    e.status = res.status; throw e;
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ── System prompt ──────────────────────────────────────────────────
function systemPrompt() {
  const guides = {
    A1: `Speak ONLY in simple English. Mix in 1-2 German words per reply and always translate them. Very short sentences. Super warm and patient. Always end with an easy question.`,
    A2: `Speak mostly English, include simple German phrases (always translated). Use present tense. Very gentle with errors. 2 sentences max. End with a simple question or German phrase to repeat.`,
    B1: `Mix German and English roughly 50/50. Present and past tense. Gently weave corrections in naturally. Engaging and encouraging. Always end with a question in German.`,
    B2: `Speak mostly German (70%). Introduce varied tenses and vocabulary. Correct errors smoothly in conversation. Challenge them a little. End with a German question.`,
    C1: `Speak almost entirely in German (90%). Use idioms, rich vocabulary, complex structures. Only correct significant errors. Natural, genuine conversation. End with a thought-provoking question.`,
    C2: `Speak exclusively in German. Sophisticated vocabulary, regional nuance, complex grammar. Converse as with a native speaker. Rarely correct. Engaging, intellectual dialogue.`
  };

  return `You are DeutschMeister, a warm and natural German conversation tutor in a LIVE VOICE chat.

STUDENT LEVEL: ${level}
INSTRUCTION: ${guides[level]}

ABSOLUTE VOICE RULES — follow these without exception:
1. Maximum 2-3 sentences per reply. This is voice — be concise.
2. NO bullet points, NO numbered lists, NO markdown, NO asterisks, NO bold, NO symbols.
3. NO emojis whatsoever.
4. Speak as if talking naturally to a friend — flowing, warm, conversational.
5. Always end your reply with a question or invitation to keep the conversation going.
6. If they make a grammar mistake, correct it by naturally using the correct form in your reply — never make it awkward.
7. Be encouraging and make them feel confident.`;
}

// ── Text-to-speech ─────────────────────────────────────────────────
function speakReply(text) {
  const cleaned = text
    .replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1')
    .replace(/[#\[\]\*_]/g, '').replace(/\n+/g, ' ').trim();

  showBubble(cleaned, 'ai-text');

  if (!synth) {
    isSpeaking = false; setState('idle');
    setStatus('Tap to reply', 'active'); return;
  }

  isSpeaking = true;
  setState('speaking');
  setStatus('Speaking…', 'speaking');

  const utt = new SpeechSynthesisUtterance(cleaned);
  const voices = synth.getVoices();
  const deVoice =
    voices.find(v => v.lang === 'de-DE' && v.localService) ||
    voices.find(v => v.lang.startsWith('de-')) ||
    voices.find(v => v.lang.startsWith('de')) || null;

  if (deVoice) { utt.voice = deVoice; utt.lang = deVoice.lang; }
  else           { utt.lang = 'de-DE'; }

  // Slower for beginners, natural for advanced
  utt.rate  = { A1:0.74, A2:0.82, B1:0.88, B2:0.93, C1:0.97, C2:1.0 }[level] || 0.9;
  utt.pitch = 1.05;
  utt.volume = 1;

  utt.onend = () => {
    isSpeaking = false; setState('idle');
    setStatus('Tap to reply', 'active');
  };
  utt.onerror = () => {
    isSpeaking = false; setState('idle');
    setStatus('Tap to speak', '');
  };

  synth.cancel();
  setTimeout(() => synth.speak(utt), 80);
}

function stopSpeaking() {
  if (synth) synth.cancel();
  isSpeaking = false;
  setState('idle');
  setStatus('Tap to speak', '');
}

// ── Error messages ─────────────────────────────────────────────────
function friendlyError(e) {
  if (e.status === 429) {
    return ['Ich bin müde! Daily quota reached — let\'s continue tomorrow!',
            'Genug für heute! Free limit hit. Bis morgen!',
            'Time for a break — quota used up. Come back tomorrow!']
           [Math.floor(Math.random()*3)];
  }
  if (e.status === 400 || e.status === 403) return 'API key issue — tap the key button to update it.';
  if (e.status >= 500) return 'Gemini is resting. Try again in a moment!';
  return 'Something went wrong — check your API key and try again.';
}

// ── History ────────────────────────────────────────────────────────
function openHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = chatHistory.length === 0
    ? '<div class="history-empty">No conversation yet. Tap the orb and start speaking!</div>'
    : chatHistory.map(m => `
        <div class="history-item ${m.role === 'user' ? 'user' : 'ai'}">
          <div class="who">${m.role === 'user' ? 'You' : 'DeutschMeister'}</div>
          ${esc(m.content)}
        </div>`).join('');
  setTimeout(() => list.scrollTop = list.scrollHeight, 50);
  document.getElementById('historyDrawer').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}
function closeHistory() {
  document.getElementById('historyDrawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
function updateCount() {
  document.getElementById('historyCount').textContent =
    chatHistory.length + ' message' + (chatHistory.length !== 1 ? 's' : '');
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
